name: Daily Workspace Health Check

on:
  schedule:
    # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC = 08:00, 14:00, 20:00, 02:00 CST
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  daily-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            MEMORY.md
            HEARTBEAT.md
            AGENTS.md
            SOUL.md
          sparse-checkout-cone-mode: false
      
      - name: Check MEMORY.md health
        run: |
          if [ ! -f MEMORY.md ]; then
            echo "ALERT: MEMORY.md missing"
            exit 1
          fi
          size=$(stat -f%z MEMORY.md 2>/dev/null || stat -c%s MEMORY.md 2>/dev/null)
          lines=$(wc -l < MEMORY.md)
          echo "MEMORY.md: $size bytes, $lines lines"
          if [ "$size" -lt 500 ]; then
            echo "WARNING: MEMORY.md is suspiciously small"
          fi
      
      - name: Check recent git activity
        run: |
          # This check works differently in CI vs local
          # In CI, we're on a detached HEAD or shallow clone
          echo "Daily check completed at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
      
      - name: Check core files
        run: |
          for f in AGENTS.md SOUL.md; do
            if [ ! -f "$f" ]; then
              echo "ALERT: $f missing"
              exit 1
            fi
          done
          echo "OK: Core files present"
      
      - name: Check memory directory
        run: |
          if [ -d memory ]; then
            count=$(find memory -name "*.md" 2>/dev/null | wc -l)
            echo "Memory files: $count"
          fi

  health-report:
    needs: daily-check
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Generate health report
        run: |
          if [ "$needs.daily-check.result" == "success" ]; then
            echo "✓ Daily health check passed"
          else
            echo "✗ Daily health check failed"
            exit 1
          fi
