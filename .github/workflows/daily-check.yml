name: Daily Workspace Health Check

on:
  schedule:
    # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC = 08:00, 14:00, 20:00, 02:00 CST
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'MEMORY.md'
      - 'AGENTS.md'
      - 'SOUL.md'
      - 'HEARTBEAT.md'

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check MEMORY.md
        run: |
          if [ ! -f MEMORY.md ]; then
            echo "::error::MEMORY.md missing"
            exit 1
          fi
          size=$(stat -c%s MEMORY.md 2>/dev/null || stat -f%z MEMORY.md)
          lines=$(wc -l < MEMORY.md)
          echo "MEMORY.md: $size bytes, $lines lines"
          if [ "$size" -lt 500 ]; then
            echo "::warning::MEMORY.md suspiciously small ($size bytes)"
          fi

      - name: Check core files
        run: |
          for f in AGENTS.md SOUL.md HEARTBEAT.md; do
            if [ ! -f "$f" ]; then
              echo "::error::$f missing"
              exit 1
            fi
          done
          echo "OK: AGENTS.md SOUL.md HEARTBEAT.md present"

      - name: Check workspace memory files
        run: |
          count=$(find memory -name "*.md" 2>/dev/null | wc -l || echo 0)
          echo "Memory files in workspace: $count"
          if [ "$count" -lt 2 ]; then
            echo "::warning::Few memory files ($count)"
          fi

      - name: Summary
        run: |
          echo "Health check completed at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
