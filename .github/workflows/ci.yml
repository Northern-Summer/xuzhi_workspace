name: Xuzhi Genesis CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  genesis-probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run genesis probe
        run: python3 centers/mind/genesis_probe.py
        continue-on-error: false

  harness-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install pytest requests feedparser httpx aiohttp
      - name: Run harness tests
        run: cd centers/engineering/harness && python3 -m pytest tests/ -q --tb=short
        continue-on-error: false

  knowledge-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Check knowledge base
        run: |
          python3 -c "
import sqlite3, os
db = 'centers/intelligence/knowledge/knowledge.db'
if not os.path.exists(db): print('SKIP: no db'); exit(0)
conn = sqlite3.connect(db)
c = conn.cursor()
c.execute('SELECT COUNT(*) FROM entities'); e = c.fetchone()[0]
c.execute('SELECT COUNT(*) FROM relations'); r = c.fetchone()[0]
print(f'entities={e} relations={r}')
assert e >= 100 and r >= 100
c.execute('PRAGMA integrity_check')
assert c.fetchone()[0] == 'ok', 'corrupted'
print('OK: knowledge integrity verified')
conn.close()
"

  self-heal-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Run self-heal check
        run: bash centers/engineering/self_heal.sh check
        continue-on-error: false
